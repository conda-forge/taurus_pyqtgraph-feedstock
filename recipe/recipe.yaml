schema_version: 1

context:
  name: taurus_pyqtgraph
  version: "0.9.8"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: e86eb8622bd172cef2f1c234eca8fcb319e701947035826fa0c9daadf8864a36

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - setuptools
    - python ${{ python_min }}.*
  run:
    - click
    - lxml
    - ply
    - pyqtgraph >=0.11,<0.14
    - python >=${{ python_min }}
    - taurus >=4.5.2

tests:
  - python:
      imports:
        - taurus_pyqtgraph
        - taurus_pyqtgraph.examples
      python_version:
        - ${{ python_min }}.*
        - 3.*
      pip_check: true

about:
  license: LGPL-3.0-or-later
  license_file: LICENSE.txt
  summary: Taurus extension providing pyqtgraph-based widgets
  description: |
    taurus_pyqtgraph is an extension for the Taurus package.
    It adds the taurus.qt.qtgui.tpg submodule which provides pyqtgraph-based
    widgets.
  homepage: https://gitlab.com/taurus-org/taurus_pyqtgraph
  repository: https://gitlab.com/taurus-org/taurus_pyqtgraph
  documentation: http://taurus-scada.org

extra:
  recipe-maintainers:
    - ovallcorba
    - beenje
    - cpascual
